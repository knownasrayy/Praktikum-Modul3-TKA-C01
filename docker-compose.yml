services:
  db:
    image: postgres:15-alpine
    container_name: tka-db
    environment:
      POSTGRES_USER: user_tka
      POSTGRES_PASSWORD: password_tka
      POSTGRES_DB: db_tka
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_tka -d db_tka"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: "./Resource Soal Modul 3/backend"
    container_name: tka-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: user_tka
      DB_PASSWORD: password_tka
      DB_NAME: db_tka
      JWT_SECRET: supersecretvibe
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: "./Resource Soal Modul 3/frontend"
    container_name: tka-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
